name: Dataset Quality Metrics

on:
  schedule:
    - cron: '0 10 * * 0'  # Sundays at 10 AM UTC (after weekly trend report)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate quality metrics
        id: metrics
        env:
          GH_TOKEN: ${{ github.token }}
          OUTPUT_DIR: data
        run: python .github/scripts/quality_metrics.py

      - name: Commit metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/quality_metrics.json data/quality_report.md
          git commit -m "Update quality metrics $(date +'%Y-%m-%d')" || echo "No changes"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Summary
        run: |
          {
            echo "### Dataset Quality Metrics"
            echo ""
            echo "- **Total records**: ${{ steps.metrics.outputs.total_records }}"
            echo "- **CT-to-Text coverage**: ${{ steps.metrics.outputs.ct_coverage }}%"
            echo ""
            cat data/quality_report.md
          } >> "$GITHUB_STEP_SUMMARY"
